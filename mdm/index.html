              { name: "Pomarola", category: "Culinária" }, { name: "Elefante", category: "Culinária" }, { name: "Tarantella", category: "Culinária" },
              { name: "Liza", category: "Culinária" }, { name: "Maria", category: "Culinária" }, { name: "Purilev", category: "Culinária" }
            ]
          },
          {
            name: "JDE",
            brands: [
              { name: "Pilão", category: "Café" }, { name: "L'OR", category: "Café" }, { name: "Damasco", category: "Café" },
              { name: "Café do Ponto", category: "Café" }, { name: "Pelé", category: "Café" }, { name: "Caboclo", category: "Café" },
              { name: "Senseo", category: "Café" }
            ]
          },
          {
            name: "3 Corações",
            brands: [
              { name: "3 Corações", category: "Café" }, { name: "Santa Clara", category: "Café" }, { name: "Pimpinela", category: "Café" },
              { name: "Iguaçu", category: "Café" }, { name: "Frisco", category: "Bebida" }, { name: "Chocolatto", category: "Bebida" },
              { name: "TRES", category: "Café" }
            ]
          },
          {
            name: "Mars",
            brands: [
              { name: "M&M's", category: "Chocolate" }, { name: "Snickers", category: "Chocolate" }, { name: "Twix", category: "Chocolate" },
              { name: "Skittles", category: "Doces" }, { name: "Raris", category: "Alimentação" }, { name: "Masterfoods", category: "Culinária" },
              { name: "Ben's Original", category: "Alimentação" }, { name: "Pedigree", category: "Pet" }, { name: "Whiskas", category: "Pet" },
              { name: "Royal Canin", category: "Pet" }
            ]
          }
        ];

        // Normalização simplificada de texto para a pesquisa
        const normalizeStr = (str) => 
          str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();

        function App() {
          const svgRef = useRef(null);
          
          const [searchTerm, setSearchTerm] = useState('');
          // Câmara inicial mais afastada para suportar a expansão massiva sem cortar o gráfico
          const [viewBox, setViewBox] = useState({ x: -4500, y: -4500, w: 19000, h: 19000 });
          const [isDragging, setIsDragging] = useState(false);
          const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
          const [touchDist, setTouchDist] = useState(null); // Adicionado para calcular pinch-to-zoom no mobile

          const CX = 5000;
          const CY = 5000;
          const R_PARENT = 3400; 

          // --- CERCA INVISÍVEL (BOUNDARIES) ---
          // Esta função impede que o utilizador arraste o mapa infinitamente para o vazio
          const clampViewBox = (x, y, w, h) => {
            const mapCenterX = 5000;
            const mapCenterY = 5000;
            const maxDist = 8000; // Limite máximo que o centro da tela pode afastar do centro do mapa

            let cx = x + w / 2;
            let cy = y + h / 2;

            // Trava o centro da tela se bater na "parede" invisível
            cx = Math.max(mapCenterX - maxDist, Math.min(mapCenterX + maxDist, cx));
            cy = Math.max(mapCenterY - maxDist, Math.min(mapCenterY + maxDist, cy));

            return {
              x: cx - w / 2,
              y: cy - h / 2,
              w,
              h
            };
          };

          const activeNodes = useMemo(() => {
            const term = normalizeStr(searchTerm);
            if (!term) return { allActive: true, parents: new Set(), brands: new Set() };

            const activeParents = new Set();
            const activeBrands = new Set();

            marketData.forEach(parent => {
              const parentMatch = normalizeStr(parent.name).includes(term);
              let hasBrandMatch = false;

              parent.brands.forEach(brand => {
                const brandMatch = normalizeStr(brand.name).includes(term);
                const catMatch = normalizeStr(brand.category).includes(term);
                if (parentMatch || brandMatch || catMatch) {
                  activeBrands.add(`${parent.name}-${brand.name}`);
                  hasBrandMatch = true;
                }
              });
              if (parentMatch || hasBrandMatch) {
                activeParents.add(parent.name);
              }
            });

            return { allActive: false, parents: activeParents, brands: activeBrands };
          }, [searchTerm]);

          const layout = useMemo(() => {
            const nodes = [];
            const links = [];
            const N = marketData.length;
            const sliceAngle = (2 * Math.PI) / N;

            marketData.forEach((parent, i) => {
              const midAngle = (i + 0.5) * sliceAngle;
              const px = CX + R_PARENT * Math.cos(midAngle);
              const py = CY + R_PARENT * Math.sin(midAngle);

              nodes.push({
                type: 'parent',
                id: parent.name,
                name: parent.name,
                x: px,
                y: py,
                angle: midAngle
              });

              // ALGORITMO DE EMPACOTAMENTO CONCÊNTRICO (GARANTIA DE 0% DE COLISÃO)
              const M = parent.brands.length;
              const marginAngle = 0.04; // Margem para não invadir a fatia da empresa vizinha
              const startAngle = i * sliceAngle + marginAngle;
              const endAngle = (i + 1) * sliceAngle - marginAngle;
              const availableAngle = endAngle - startAngle;

              let currentRadius = R_PARENT + 420; // Distância inicial a partir da marca-mãe
              const itemRadius = 110; // Raio exato da submarca definido no render
              const paddingX = 60; // Espaço horizontal mínimo garantido entre bolhas
              const paddingY = 270; // Espaço vertical entre as camadas

              let placedCount = 0;

              while (placedCount < M) {
                // Calcula a largura angular que cada item exige nesta distância atual
                const itemAngularWidth = (itemRadius * 2 + paddingX) / currentRadius;
                
                // Calcula quantos itens cabem nesta camada sem se tocarem fisicamente
                const maxItemsInRow = Math.max(1, Math.floor(availableAngle / itemAngularWidth));
                const itemsInThisRow = Math.min(maxItemsInRow, M - placedCount);

                // Centraliza a "fila" de bolhas dentro da fatia disponível para que fique simétrico
                const rowAngularWidth = itemsInThisRow * itemAngularWidth;
                const emptyAngle = availableAngle - rowAngularWidth;
                const rowStartAngle = startAngle + (emptyAngle / 2) + (itemAngularWidth / 2);

                for (let k = 0; k < itemsInThisRow; k++) {
                  const brand = parent.brands[placedCount];
                  const bAngle = rowStartAngle + k * itemAngularWidth;
                  
                  // Um pequeno "ruído" na distância para quebrar o visual de grelha (aspeto orgânico)
                  const wobble = Math.sin(placedCount * 13 + i) * 30;
                  const finalRadius = currentRadius + wobble;
                  
                  const bx = CX + finalRadius * Math.cos(bAngle);
                  const by = CY + finalRadius * Math.sin(bAngle);
                  const brandId = `${parent.name}-${brand.name}`;

                  nodes.push({
                    type: 'brand',
                    id: brandId,
                    parentId: parent.name,
                    name: brand.name,
                    category: brand.category,
                    x: bx,
                    y: by,
                    angle: bAngle
                  });

                  links.push({
                    source: { x: px, y: py },
                    target: { x: bx, y: by },
                    parentId: parent.name,
                    brandId: brandId
                  });

                  placedCount++;
                }
                
                // Terminou a linha, avança para a próxima camada concêntrica (expansão radial)
                currentRadius += paddingY;
              }
            });

            return { nodes, links };
          }, []);

          const handleMouseDown = (e) => {
            setIsDragging(true);
            setDragStart({ x: e.clientX, y: e.clientY });
          };

          const handleMouseMove = (e) => {
            if (!isDragging) return;
            const svgRect = svgRef.current.getBoundingClientRect();
            const scaleX = viewBox.w / svgRect.width;
            const scaleY = viewBox.h / svgRect.height;
            const dx = (e.clientX - dragStart.x) * scaleX;
            const dy = (e.clientY - dragStart.y) * scaleY;

            // Aplica a cerca invisível durante o arrasto
            setViewBox(prev => clampViewBox(prev.x - dx, prev.y - dy, prev.w, prev.h));
            setDragStart({ x: e.clientX, y: e.clientY });
          };

          const handleMouseUp = () => setIsDragging(false);

          // --- EVENTOS DE TOQUE (MOBILE) ---
          const handleTouchStart = (e) => {
            if (e.touches.length === 1) {
              // Arrastar com um dedo
              setIsDragging(true);
              setDragStart({ x: e.touches[0].clientX, y: e.touches[0].clientY });
            } else if (e.touches.length === 2) {
              // Iniciar pinça (Pinch-to-zoom)
              const dist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
              );
              setTouchDist(dist);
            }
          };

          const handleTouchMove = (e) => {
            // O CSS touch-action="none" no SVG impede o scroll/bounce indesejado da página
            if (isDragging && e.touches.length === 1) {
              // Lógica de arrastar com toque
              const svgRect = svgRef.current.getBoundingClientRect();
              const scaleX = viewBox.w / svgRect.width;
              const scaleY = viewBox.h / svgRect.height;
              const dx = (e.touches[0].clientX - dragStart.x) * scaleX;
              const dy = (e.touches[0].clientY - dragStart.y) * scaleY;

              // Aplica a cerca invisível durante o arrasto no touch
              setViewBox(prev => clampViewBox(prev.x - dx, prev.y - dy, prev.w, prev.h));
              setDragStart({ x: e.touches[0].clientX, y: e.touches[0].clientY });
            } else if (e.touches.length === 2 && touchDist !== null) {
              // Lógica de zoom com dois dedos
              const newDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
              );
              const scaleChange = touchDist / newDist;
              
              setViewBox(prev => {
                const newW = prev.w * scaleChange;
                const newH = prev.h * scaleChange;
                if (newW > 45000 || newW < 1000) return prev;
                const dx = (prev.w - newW) / 2;
                const dy = (prev.h - newH) / 2;
                return clampViewBox(prev.x + dx, prev.y + dy, newW, newH);
              });
              setTouchDist(newDist);
            }
          };

          const handleTouchEnd = () => {
            setIsDragging(false);
            setTouchDist(null);
          };

          useEffect(() => {
            const svgElement = svgRef.current;
            if (!svgElement) return;

            const handleWheel = (e) => {
              e.preventDefault();
              const zoomFactor = 1.1;
              const direction = e.deltaY > 0 ? 1 : -1;
              const scaleChange = direction > 0 ? zoomFactor : 1 / zoomFactor;

              setViewBox(prev => {
                const newW = prev.w * scaleChange;
                const newH = prev.h * scaleChange;
                // Aumentei massivamente o limite máximo de zoom para poder visualizar toda a nova malha!
                if (newW > 45000 || newW < 1000) return prev;
                const dx = (prev.w - newW) / 2;
                const dy = (prev.h - newH) / 2;
                
                // Cerca invisível aplicada também no Scroll
                return clampViewBox(prev.x + dx, prev.y + dy, newW, newH);
              });
            };

            svgElement.addEventListener('wheel', handleWheel, { passive: false });
            return () => svgElement.removeEventListener('wheel', handleWheel);
          }, []);

          // --- BOTÕES DE ZOOM (Cerca invisível aplicada) ---
          const handleZoomBtn = (action) => {
            setViewBox(prev => {
              const factor = action === 'in' ? 0.8 : 1.25;
              const newW = prev.w * factor;
              const newH = prev.h * factor;
              if (newW > 45000 || newW < 1000) return prev;
              const dx = (prev.w - newW) / 2;
              const dy = (prev.h - newH) / 2;
              return clampViewBox(prev.x + dx, prev.y + dy, newW, newH);
            });
          };

          // Estilização condicional baseada na pesquisa
          const getOpacity = (type, id) => {
            if (activeNodes.allActive) return 1;
            if (type === 'parent' && activeNodes.parents.has(id)) return 1;
            if (type === 'brand' && activeNodes.brands.has(id)) return 1;
            return 0.15;
          };

          const getStrokeWidth = (type, id) => {
            if (activeNodes.allActive) return type === 'parent' ? 10 : 4;
            const isActive = type === 'parent' ? activeNodes.parents.has(id) : activeNodes.brands.has(id);
            return isActive ? (type === 'parent' ? 16 : 8) : 2;
          };

          const calculateFontSize = (text, parentNode) => {
            const maxFontSize = parentNode ? 70 : 32;
            const maxWidth = parentNode ? 400 : 180;
            const estimatedCharWidth = 0.55; 
            const calculatedSize = maxWidth / (text.length * estimatedCharWidth);
            return Math.min(maxFontSize, calculatedSize);
          };

          return (
            <div className="w-full h-screen bg-[#050505] font-dm text-white overflow-hidden relative selection:bg-white selection:text-black">
              
              {/* Interface Flutuante Responsiva */}
              <div className="absolute top-0 left-0 w-full p-4 md:p-6 z-10 flex flex-col md:flex-row items-center justify-between pointer-events-none gap-3 md:gap-4">
                <div className="pointer-events-auto flex flex-col items-center md:items-start bg-black/40 p-3 md:p-4 rounded-2xl backdrop-blur-md border border-white/5 w-[90%] md:w-auto">
                  <h1 className="font-cal text-2xl md:text-5xl tracking-tight leading-none mb-1 text-center md:text-left">Mapa de Marcas</h1>
                  <p className="text-white/60 text-xs md:text-base max-w-sm text-center md:text-left text-balance">
                    As gigantes que controlam o consumo nacional.
                  </p>
                </div>

                <div className="pointer-events-auto relative w-[90%] md:w-[400px]">
                  <input
                    type="text"
                    className="w-full bg-white/10 border border-white/20 text-white rounded-full py-2.5 md:py-3 pl-10 md:pl-12 pr-4 text-sm md:text-base focus:outline-none focus:ring-2 focus:ring-white transition-all backdrop-blur-sm relative z-0"
                    placeholder="Pesquise marcas ou categorias."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                  <div className="absolute inset-y-0 left-3 md:left-4 flex items-center pointer-events-none text-white/80 z-10">
                    <SearchIcon />
                  </div>
                </div>
              </div>

              {/* Botões de Zoom Ajustados para Mobile */}
              <div className="absolute bottom-6 right-4 md:bottom-8 md:right-8 z-10 flex flex-col gap-2 md:gap-3 pointer-events-auto">
                <button onClick={() => handleZoomBtn('in')} className="p-2 md:p-3 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full border border-white/10 text-white shadow-xl"><ZoomInIcon /></button>
                <button onClick={() => handleZoomBtn('out')} className="p-2 md:p-3 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full border border-white/10 text-white shadow-xl"><ZoomOutIcon /></button>
                <button onClick={() => setViewBox({ x: -4500, y: -4500, w: 19000, h: 19000 })} className="p-2 md:p-3 bg-white text-black hover:bg-gray-200 rounded-full mt-1 md:mt-2 shadow-xl"><MaximizeIcon /></button>
              </div>

              {/* Legenda Dinâmica Desktop/Mobile */}
              <div className="absolute bottom-6 left-4 md:bottom-8 md:left-8 z-10 flex items-center gap-2 md:gap-3 bg-black/50 backdrop-blur-md px-3 py-1.5 md:px-4 md:py-2 rounded-full border border-white/10 pointer-events-none text-white/60 text-xs md:text-sm">
                <TargetIcon />
                <span className="hidden md:inline">Arraste e use o scroll para navegar</span>
                <span className="md:hidden">Arraste ou faça pinça para zoom</span>
              </div>

              <svg
                ref={svgRef}
                className={`w-full h-full select-none ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                style={{ touchAction: 'none' }}
                viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`}
                onMouseDown={handleMouseDown}
                onMouseMove={handleMouseMove}
                onMouseUp={handleMouseUp}
                onMouseLeave={handleMouseUp}
                onTouchStart={handleTouchStart}
                onTouchMove={handleTouchMove}
                onTouchEnd={handleTouchEnd}
                onTouchCancel={handleTouchEnd}
              >
                {/* NÚCLEO CENTRAL */}
                <g className="pointer-events-none select-none">
                  <circle cx={CX} cy={CY} r={1500} fill="white" />
                  <text x={CX} y={CY - 160} textAnchor="middle" dominantBaseline="central" fill="black" fontSize="320px" className="font-cal tracking-tighter">
                    MERCADO
                  </text>
                  <text x={CX} y={CY + 160} textAnchor="middle" dominantBaseline="central" fill="black" fontSize="320px" className="font-cal tracking-tighter">
                    BRASILEIRO
                  </text>
                </g>

                {/* LINHAS DE CONEXÃO */}
                <g>
                  {layout.links.map((link, i) => {
                    const opacity = activeNodes.allActive ? 0.3 : 
                      (activeNodes.brands.has(link.brandId)) ? 1 : 0.05;
                    return (
                      <line
                        key={`link-${i}`}
                        x1={link.source.x} y1={link.source.y}
                        x2={link.target.x} y2={link.target.y}
                        stroke="white"
                        strokeWidth={activeNodes.allActive ? 4 : (opacity === 1 ? 10 : 2)}
                        opacity={opacity}
                        className="transition-opacity duration-300"
                      />
                    );
                  })}
                </g>

                {/* MARCAS-MÃE E SUBMARCAS */}
                <g>
                  {layout.nodes.map((node) => {
                    const isParent = node.type === 'parent';
                    const radius = isParent ? 250 : 110;
                    const opacity = getOpacity(node.type, node.id);
                    const strokeW = getStrokeWidth(node.type, node.id);
                    const fontSize = calculateFontSize(node.name, isParent);
                    const catFontSize = !isParent ? Math.min(22, 160 / (node.category.length * 0.55)) : 0;

                    return (
                      <g 
                        key={node.id} 
                        className="transition-opacity duration-300" 
                        style={{ opacity, transition: 'opacity 0.4s ease-in-out' }}
                      >
                        <circle
                          cx={node.x} cy={node.y} r={radius}
                          fill="#050505" stroke="white" strokeWidth={strokeW}
                          className="transition-all duration-300"
                        />
                        <text
                          x={node.x} y={node.y - (isParent ? 0 : 12)}
                          textAnchor="middle" dominantBaseline="central"
                          fill="white" fontSize={`${fontSize}px`} fontWeight="bold"
                          className="font-cal pointer-events-none select-none"
                        >
                          {node.name}
                        </text>
                        {!isParent && (
                          <text
                            x={node.x} y={node.y + 35}
                            textAnchor="middle" dominantBaseline="central"
                            fill="#a3a3a3" fontSize={`${catFontSize}px`}
                            className="font-dm font-medium pointer-events-none select-none tracking-wide uppercase"
                          >
                            {node.category}
                          </text>
                        )}
                      </g>
                    );
                  })}
                </g>
              </svg>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
